name: indexing-service

# Локальный стек всего конвейера: каталог → job+outbox → relay →
# embedding.jobs → embedding-service → embedding.events → Qdrant.
#
# Профиль `fake-embedding` поднимает заглушку embedding-service: она читает
# команды и сразу отвечает событиями с детерминированными векторами, чтобы
# конвейер можно было прогнать целиком без модели и GPU.
x-app-env: &app-env
  INDEXING_RABBITMQ_DSN: amqp://guest:guest@rabbitmq:5672/
  INDEXING_DATABASE_URL: postgresql+asyncpg://indexing:indexing@postgres:5432/indexing
  INDEXING_QDRANT_URL: http://qdrant:6333
  INDEXING_CATALOG_BASE_URL: http://host.docker.internal:8000
  INDEXING_DEFAULT_CURRENCY: RUB
  INDEXING_EMBEDDING_DIM: "8"

x-build: &app-build
  build:
    context: ..
    dockerfile: docker/Dockerfile

x-depends: &app-depends
  rabbitmq:
    condition: service_healthy
  postgres:
    condition: service_healthy
  qdrant:
    condition: service_started

services:
  qdrant:
    image: qdrant/qdrant:v1.13.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: indexing
      POSTGRES_PASSWORD: indexing
      POSTGRES_DB: indexing
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexing -d indexing"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Консюмер каталога: событие → карточка в Qdrant + job и команда в outbox.
  # Единственная роль, накатывающая миграции.
  consumer:
    <<: *app-build
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "1"
    ports:
      - "8000:8000"
    depends_on: *app-depends
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen('http://localhost:8000/health')"
      interval: 5s
      timeout: 5s
      retries: 20

  # Relay: outbox → exchange embedding.jobs (publisher confirms, SKIP LOCKED).
  # Он же переснимает метрики отставания конвейера.
  relay:
    <<: *app-build
    environment: *app-env
    ports:
      - "8002:8000"
    depends_on:
      consumer:
        condition: service_healthy
    command:
      - uvicorn
      - indexing_service.presentation.messaging.relay_app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  # Консюмер результатов: embedding.events → векторы в Qdrant, job → DONE.
  result-consumer:
    <<: *app-build
    environment: *app-env
    ports:
      - "8001:8000"
    depends_on:
      consumer:
        condition: service_healthy
    command:
      - uvicorn
      - indexing_service.presentation.messaging.result_consumer_app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  # Заглушка embedding-service для smoke: команда → событие с векторами.
  fake-embedding:
    <<: *app-build
    profiles: ["fake-embedding"]
    environment: *app-env
    depends_on:
      rabbitmq:
        condition: service_healthy
    command:
      - python
      - -m
      - indexing_service.tools.fake_embedding_service

  reindex:
    <<: *app-build
    profiles: ["reindex"]
    environment: *app-env
    command:
      - python
      - -m
      - indexing_service
      - reindex
      - --target
      - products_v2

  reindex-swap:
    <<: *app-build
    profiles: ["reindex"]
    environment: *app-env
    command:
      - python
      - -m
      - indexing_service
      - reindex-swap
      - --target
      - products_v2

  reconcile:
    <<: *app-build
    profiles: ["reconcile"]
    environment: *app-env
    command:
      - python
      - -m
      - indexing_service
      - reconcile

volumes:
  qdrant_data:
  pg_data:
